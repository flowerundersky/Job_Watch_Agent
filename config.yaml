job_role: AI应用开发工程师        #填写你的招聘岗位
company_filters: "优先校招官网"  #这个字段里面可以添加任意文本作为筛选条件，模型会尽量满足这些条件
top_x: 30
model_backend:
  backend: openai_compatible


  api_base_url: "你的url"
  api_key: "你的key"
  model: "gpt-5.5"
  timeout_seconds: 60
  temperature: 0.2
  max_tokens: 4096
runtime:
  output_dir: output
  timeout_seconds: 30
  max_crawl_chars: 12000
  max_links_per_page: 20
