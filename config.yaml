sources:
  - https://example.com/careers
keywords:
  - Python
  - 数据分析
  - LLM
companies:
  - 示例科技
model_backend:
  backend: rule
  api_base_url: ""
  api_key: ""
  model: gpt-4o-mini
  timeout_seconds: 30
  temperature: 0.2
  max_tokens: 512
  system_prompt: "你是招聘信息分析助手。请根据给定岗位信息判断是否匹配目标条件，并只返回 JSON，格式为 {\"matched\": true/false, \"score\": number, \"reasons\": [\"...\"]}。"
stop_after:
  max_matches: 10
runtime:
  output_dir: output
  data_dir: data
  logs_dir: logs
  timeout_seconds: 10
